<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Encontro de Dois Móveis - Prof. Ojeda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
/* 1. CONFIGURAÇÃO DE DESIGN SISTÊMICO */
* { box-sizing: border-box; }
body {
  background-color: #f1f5f9;
  font-family: 'DM Sans', sans-serif;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.main-application {
  background-color: #fff;
  border-radius: 8px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.08);
  width: 1280px;
  padding: 30px 40px;
  position: relative;
  border-left: 12px solid #005088;
}

/* Cabeçalho Minimalista com sua Assinatura */
.app-header {
  border-bottom: 1px solid #e2e8f0;
  padding-bottom: 15px;
  margin-bottom: 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.app-header h1 {
  color: #003366;
  font-family: 'Merriweather', serif;
  font-size: 28px;
  margin: 0;
}
.app-header .author {
  font-size: 18px;
  font-weight: 500;
  color: #64748b;
  margin: 0;
}

/* 2. COMPONENTES DO SIMULADOR */
.simulator-wrapper {
  display: flex;
  gap: 25px;
  width: 100%;
}
.panel-ctrl {
  background: #f8fafc;
  border-radius: 12px;
  padding: 18px;
  width: 320px;
  border: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sim-stage {
  flex-grow: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.bloco-movel { border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; text-align: left; }
.m1-style { border-left: 5px solid #0056b3; background: #f0f7ff; }
.m2-style { border-left: 5px solid #cc0000; background: #fff5f5; }

label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 3px; color: #1e293b; }
span.val-display { font-weight: 400; color: #64748b; margin-left: 5px; }
input[type="range"] { width: 100%; height: 6px; cursor: pointer; margin-bottom: 8px; }
select { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #cbd5e1; background: white; font-size: 13px; margin-bottom: 8px;}
button { width: 100%; padding: 12px; background: #005088; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 15px; }
button:hover { background: #003366; }

canvas { background: white; border: 1px solid #94a3b8; border-radius: 4px; display: block; margin: 0 auto; }

.encontro-feedback {
  background: #ecfdf5;
  border: 1px solid #10b981;
  border-radius: 8px;
  padding: 10px;
  margin-top: 15px;
  font-weight: bold;
  color: #065f46;
  font-size: 14px;
  text-align: center;
}

.escondido { display: none !important; }
</style>
</head>
<body>

<div class="main-application">
    <header class="app-header">
        <h1>Laboratório Virtual de Cinemática (MU / MUV)</h1>
        <p class="author">Prof. João Henrique Ojeda</p>
    </header>

    <div class="simulator-wrapper">
        <div class="panel-ctrl">
            <h3 style="font-size: 16px; margin: 0 0 15px 0; color: #003366;">Controles do Lab</h3>
            
            <div class="bloco-movel m1-style">
                <label>Móvel 1 (Azul)</label>
                <select id="tipo1" onchange="alternarControles()">
                    <option value="MU">MU (Vel. Constante)</option>
                    <option value="MUV">MUV (Acelerado)</option>
                </select>
                <label>S₀: <span id="v_s01" class="val-display">0</span> m</label>
                <input type="range" id="s01" min="0" max="200" value="0" oninput="atualizarValores()">
                <label>V₀: <span id="v_v01" class="val-display">15</span> m/s</label>
                <input type="range" id="v01" min="-40" max="40" value="15" oninput="atualizarValores()">
                <div id="grupo-a1" class="escondido">
                    <label>a: <span id="v_a1" class="val-display">0</span> m/s²</label>
                    <input type="range" id="a1" min="-10" max="10" step="0.5" value="0" oninput="atualizarValores()">
                </div>
            </div>

            <div class="bloco-movel m2-style">
                <label>Móvel 2 (Vermelho)</label>
                <select id="tipo2" onchange="alternarControles()">
                    <option value="MU">MU</option>
                    <option value="MUV" selected>MUV</option>
                </select>
                <label>S₀: <span id="v_s02" class="val-display">160</span> m</label>
                <input type="range" id="s02" min="0" max="200" value="160" oninput="atualizarValores()">
                <label>V₀: <span id="v_v02" class="val-display">-10</span> m/s</label>
                <input type="range" id="v02" min="-40" max="40" value="-10" oninput="atualizarValores()">
                <div id="grupo-a2">
                    <label>a: <span id="v_a2" class="val-display">2</span> m/s²</label>
                    <input type="range" id="a2" min="-10" max="10" step="0.5" value="2" oninput="atualizarValores()">
                </div>
            </div>

            <label>Tempo Máx: <span id="v_tmax" class="val-display">30</span> s</label>
            <input type="range" id="tmax" min="5" max="60" value="30" oninput="atualizarValores()">
            
            <button id="btn-animar" onclick="iniciarAnimacao()">▶ Iniciar Animação</button>
            <div id="container-encontro" class="encontro-feedback">Encontro: ---</div>
        </div>

        <div class="sim-stage">
            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <canvas id="canvasSimulacao" width="880" height="150"></canvas>
                <p style="font-size: 24px; font-weight: bold; margin: 12px 0 0;">Tempo: <span id="txt-tempo" style="color: #cc0000;">0.00</span>s</p>
            </div>
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <span style="font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 5px; text-align: left;">POSIÇÃO (S x t)</span>
                    <canvas id="canvasPosicao" width="432" height="180"></canvas>
                </div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <span style="font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 5px; text-align: left;">VELOCIDADE (V x t)</span>
                    <canvas id="canvasVelocidade" width="432" height="180"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("canvasSimulacao"), ctx = canvas.getContext("2d");
const canvasS = document.getElementById("canvasPosicao"), ctxS = canvasS.getContext("2d");
const canvasV = document.getElementById("canvasVelocidade"), ctxV = canvasV.getContext("2d");

let tempoAtual = 0, tMax = 30, animacaoId = null, rodando = false, temposEncontro = [];

function atualizarValores() {
    const ids = ["s01", "v01", "a1", "s02", "v02", "a2", "tmax"];
    ids.forEach(id => document.getElementById("v_" + id).innerText = document.getElementById(id).value);
    tMax = parseFloat(document.getElementById("tmax").value);
    verificarEncontroTeorico();
    if (!rodando) {
        tempoAtual = 0; document.getElementById("txt-tempo").innerText = "0.00"; desenharCenario(0);
    }
}

function alternarControles() {
    document.getElementById("grupo-a1").classList.toggle("escondido", document.getElementById("tipo1").value === "MU");
    document.getElementById("grupo-a2").classList.toggle("escondido", document.getElementById("tipo2").value === "MU");
    atualizarValores();
}

function calcularPosicao(tipo, s0, v0, a, t) {
    return tipo === "MU" ? s0 + v0 * t : s0 + v0 * t + 0.5 * a * t * t;
}

function calcularVelocidade(tipo, v0, a, t) {
    return tipo === "MU" ? v0 : v0 + a * t;
}

function desenharVetor(g, x, y, mag, cor, label) {
    if (Math.abs(mag) < 0.1) return;
    let len = mag * 5.0, fX = x + len;
    g.beginPath(); g.moveTo(x, y); g.lineTo(fX, y); g.strokeStyle = cor; g.lineWidth = 5; g.stroke();
    let head = 10, dir = mag > 0 ? 1 : -1;
    g.beginPath(); g.moveTo(fX, y); g.lineTo(fX - dir * head, y - head / 1.5); g.lineTo(fX - dir * head, y + head / 1.5); g.fillStyle = cor; g.fill();
    g.fillStyle = cor; g.font = "bold 13px Arial"; g.fillText(label, fX + (dir * 6) - 7, y - 7);
}

function desenharVetorAcel(g, x, y, mag, cor, label) {
     if (Math.abs(mag) < 0.1) return;
     let len_a = mag * 1.5, fX = x + len_a;
     g.beginPath(); g.moveTo(x, y); g.lineTo(fX, y); g.strokeStyle = cor; g.lineWidth = 3; g.stroke();
     let head = 6, dir = mag > 0 ? 1 : -1;
     g.beginPath(); g.moveTo(fX, y); g.lineTo(fX - dir * head, y - head / 1.5); g.lineTo(fX - dir * head, y + head / 1.5); g.fillStyle = cor; g.fill();
     g.fillStyle = cor; g.font = "bold 10px Arial"; g.fillText(label, fX + (dir * 4) - 5, y - 5);
}

function desenharCenario(tempoFoco) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const mE = 50, lU = 780;
    ctx.beginPath(); ctx.moveTo(mE, 105); ctx.lineTo(mE + lU, 105); ctx.strokeStyle = "#444"; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = "#666"; ctx.font = "10px Arial";
    for (let i = 0; i <= 200; i += 20) {
        let xM = mE + (i / 200) * lU; ctx.fillRect(xM, 105, 2, 8); ctx.fillText(i + "m", xM - 10, 127);
    }
    const t1 = document.getElementById("tipo1").value, s01 = parseFloat(document.getElementById("s01").value), v01 = parseFloat(document.getElementById("v01").value), a1 = t1 === "MUV" ? parseFloat(document.getElementById("a1").value) : 0;
    const t2 = document.getElementById("tipo2").value, s02 = parseFloat(document.getElementById("s02").value), v02 = parseFloat(document.getElementById("v02").value), a2 = t2 === "MUV" ? parseFloat(document.getElementById("a2").value) : 0;
    const x1 = mE + (calcularPosicao(t1, s01, v01, a1, tempoFoco) / 200) * lU;
    const x2 = mE + (calcularPosicao(t2, s02, v02, a2, tempoFoco) / 200) * lU;
    const curV1 = calcularVelocidade(t1, v01, a1, tempoFoco);
    const curV2 = calcularVelocidade(t2, v02, a2, tempoFoco);
    if (x1 >= mE - 15 && x1 <= mE + lU + 15) { 
        ctx.fillStyle = "#0056b3"; ctx.fillRect(x1 - 15, 65, 30, 30); ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText("M1", x1 - 9, 85); 
        desenharVetor(ctx, x1, 50, curV1, "#00c4ff", "v1"); if(t1 === "MUV") desenharVetorAcel(ctx, x1, 35, a1 * 10, "#9d00ff", "a1"); 
    }
    if (x2 >= mE - 15 && x2 <= mE + lU + 15) { 
        ctx.fillStyle = "#cc0000"; ctx.fillRect(x2 - 15, 65, 30, 30); ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText("M2", x2 - 9, 85); 
        desenharVetor(ctx, x2, 50, curV2, "#ff6a00", "v2"); if(t2 === "MUV") desenharVetorAcel(ctx, x2, 35, a2 * 10, "#b300ff", "a2"); 
    }
    desenharEixos(ctxS, canvasS, "t(s)", "S(m)", 0, 200); desenharEixos(ctxV, canvasV, "t(s)", "V(m/s)", -50, 50);
    plotar(ctxS, canvasS, t1, s01, v01, a1, t2, s02, v02, a2, tempoFoco, "S", 0, 200); plotar(ctxV, canvasV, t1, s01, v01, a1, t2, s02, v02, a2, tempoFoco, "V", -50, 50);
}

function desenharEixos(g, c, lx, ly, min, max) {
    g.clearRect(0,0,c.width,c.height); g.strokeStyle="#cbd5e1"; let zY = c.height-20 - (-min/(max-min))*(c.height-35);
    g.beginPath(); g.moveTo(35,zY); g.lineTo(c.width-10,zY); g.stroke();
    g.beginPath(); g.moveTo(35,5); g.lineTo(35,c.height-20); g.stroke();
    g.fillStyle="#64748b"; g.font="9px DM Sans"; g.fillText(lx, c.width-25, zY-4); g.fillText(ly, 38, 12);
}

function plotar(g, c, t1, s01, v01, a1, t2, s02, v02, a2, tLim, tipoG, minY, maxY) {
    const lU = c.width-50, hU = c.height-35; if (tLim === 0) return;
    function getX(t) { return 35 + (t/tMax)*lU; }
    function getY(v) { return (c.height-20) - ((v-minY)/(maxY-minY))*hU; }
    [[t1, s01, v01, a1, "#0056b3"], [t2, s02, v02, a2, "#cc0000"]].forEach(m => {
        g.beginPath(); g.strokeStyle=m[4]; g.lineWidth=2;
        for (let t=0; t<=tLim; t+=0.1) {
            let v = tipoG === "S" ? calcularPosicao(m[0], m[1], m[2], m[3], t) : calcularVelocidade(m[0], m[2], m[3], t);
            t === 0 ? g.moveTo(getX(t), getY(v)) : g.lineTo(getX(t), getY(v));
        }
        g.stroke();
    });
    if (tipoG === "S" && temposEncontro.length > 0) {
        temposEncontro.forEach(t_e => {
            if (t_e <= tLim) {
                let s_e = calcularPosicao(t1, s01, v01, a1, t_e); let px = getX(t_e), py = getY(s_e);
                g.beginPath(); g.arc(px,py,6,0,7); g.fillStyle="#10b981"; g.fill(); g.strokeStyle="#1e293b"; g.lineWidth=2; g.stroke();
                g.font = "bold 11px DM Sans"; g.lineWidth = 3; g.strokeStyle = "#ffffff"; g.strokeText(t_e.toFixed(2)+"s", px+10, py+4); g.fillStyle = "#047857"; g.fillText(t_e.toFixed(2)+"s", px+10, py+4);
            }
        });
    }
}

function verificarEncontroTeorico() {
    const t1 = document.getElementById("tipo1").value, s01 = parseFloat(document.getElementById("s01").value), v01 = parseFloat(document.getElementById("v01").value), a1 = t1 === "MUV" ? parseFloat(document.getElementById("a1").value) : 0;
    const t2 = document.getElementById("tipo2").value, s02 = parseFloat(document.getElementById("s02").value), v02 = parseFloat(document.getElementById("v02").value), a2 = t2 === "MUV" ? parseFloat(document.getElementById("a2").value) : 0;
    let A = 0.5*(a1-a2), B = v01-v02, C = s01-s02; temposEncontro = [];
    if (Math.abs(A) < 0.001) { if (Math.abs(B)>0.001) { let t = -C/B; if (t>=0 && t<=tMax) temposEncontro.push(t); } }
    else {
        let d = B*B-4*A*C;
        if (d>=0) {
            let r1 = (-B+Math.sqrt(d))/(2*A), r2 = (-B-Math.sqrt(d))/(2*A);
            if (r1>=0 && r1<=tMax) temposEncontro.push(r1); if (r2>=0 && r2<=tMax) temposEncontro.push(r2);
            temposEncontro.sort((x,y)=>x-y); if (temposEncontro.length===2 && Math.abs(temposEncontro[0]-temposEncontro[1])<0.1) temposEncontro.pop();
        }
    }
    const c = document.getElementById("container-encontro");
    if (temposEncontro.length===0) { c.innerText = "Não se encontram em até " + tMax + "s"; c.style.background="#fff5f5"; c.style.color="#b91c1c"; }
    else {
        c.style.background="#ecfdf5"; c.style.color="#065f46";
        c.innerHTML = temposEncontro.map((t,i) => `Enc. ${i+1}: <b>${t.toFixed(2)}s</b> | <b>${calcularPosicao(t1,s01,v01,a1,t).toFixed(1)}m</b>`).join("<br>");
    }
}

function iniciarAnimacao() {
    if (rodando) { rodando = false; cancelAnimationFrame(animacaoId); document.getElementById("btn-animar").innerText = "▶ Iniciar Animação"; }
    else { rodando = true; tempoAtual = 0; document.getElementById("btn-animar").innerText = "⏹ Parar Animação"; loop(); }
}
function loop() {
    if (tempoAtual >= tMax) { iniciarAnimacao(); return; }
    tempoAtual += 0.02; document.getElementById("txt-tempo").innerText = tempoAtual.toFixed(2); desenharCenario(tempoAtual); if (rodando) animacaoId = requestAnimationFrame(loop);
}
window.onload = alternarControles;
</script>

</body>
</html>
